<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CityChat | Общайся с людьми со всего мира</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        /* Контейнер чата */
        .chat-container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex;
            height: 90vh;
        }

        /* Боковая панель */
        .sidebar {
            width: 320px;
            background: #2c3e50;
            color: white;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 20px;
            background: #1a2a3a;
            border-bottom: 1px solid #3e5a6f;
        }

        .sidebar-header h2 {
            font-size: 1.5rem;
            margin-bottom: 5px;
        }

        .user-profile {
            background: #34495e;
            padding: 12px;
            border-radius: 12px;
            margin-top: 15px;
        }

        .user-profile-name {
            font-weight: bold;
            font-size: 1rem;
        }

        .user-profile-city {
            font-size: 0.8rem;
            opacity: 0.8;
        }

        .logout-btn {
            margin-top: 10px;
            padding: 6px 12px;
            background: #e74c3c;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-size: 0.8rem;
            width: 100%;
        }

        .logout-btn:hover {
            background: #c0392b;
        }

        .city-filter {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: none;
            background: #3e5a6f;
            color: white;
            margin-top: 15px;
        }

        .city-filter::placeholder {
            color: #95a5a6;
        }

        .online-stats {
            padding: 10px 20px;
            background: #1a2a3a;
            font-size: 0.8rem;
            border-bottom: 1px solid #3e5a6f;
        }

        .online-users {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .user-item {
            padding: 10px;
            margin-bottom: 8px;
            background: #34495e;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-item:hover {
            background: #3e5a6f;
            transform: translateX(5px);
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .user-info {
            flex: 1;
        }

        .user-name {
            font-weight: bold;
            font-size: 0.9rem;
        }

        .user-city {
            font-size: 0.7rem;
            opacity: 0.8;
        }

        .online-dot {
            width: 8px;
            height: 8px;
            background: #2ecc71;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }

        /* Основной чат */
        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #ecf0f1;
        }

        .chat-header {
            padding: 20px;
            background: white;
            border-bottom: 1px solid #ddd;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-title {
            font-size: 1.3rem;
            font-weight: bold;
            color: #2c3e50;
        }

        .private-chat-info {
            font-size: 0.8rem;
            color: #667eea;
        }

        .city-badge {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 5px 12px;
            border-radius: 20px;
            color: white;
            font-size: 0.8rem;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            display: flex;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.own {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 60%;
            padding: 10px 15px;
            border-radius: 18px;
            background: white;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .message.own .message-bubble {
            background: #667eea;
            color: white;
        }

        .message.system .message-bubble {
            background: #f39c12;
            color: white;
            text-align: center;
            max-width: 80%;
        }

        .message.private .message-bubble {
            background: #9b59b6;
            color: white;
            border-left: 3px solid #f1c40f;
        }

        .message-info {
            font-size: 0.7rem;
            margin-bottom: 5px;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .message-sender {
            font-weight: bold;
        }

        .message-city {
            font-size: 0.65rem;
            opacity: 0.7;
        }

        .message-time {
            font-size: 0.65rem;
            opacity: 0.6;
        }

        .message-text {
            word-wrap: break-word;
        }

        .input-panel {
            padding: 20px;
            background: white;
            border-top: 1px solid #ddd;
        }

        .input-wrapper {
            display: flex;
            gap: 10px;
        }

        .input-wrapper input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 25px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-wrapper input:focus {
            border-color: #667eea;
        }

        .send-btn {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s;
        }

        .send-btn:hover {
            transform: scale(1.05);
        }

        .typing-indicator {
            padding: 5px 20px;
            font-size: 0.8rem;
            color: #7f8c8d;
            font-style: italic;
        }

        /* Модальные окна */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            width: 450px;
            max-width: 90%;
        }

        .modal-content h2 {
            margin-bottom: 20px;
            color: #2c3e50;
            text-align: center;
        }

        .modal-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #ecf0f1;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            color: #7f8c8d;
            transition: all 0.3s;
        }

        .tab-btn.active {
            color: #667eea;
            border-bottom: 2px solid #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 1rem;
        }

        .modal-content button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 10px;
        }

        .error-message {
            color: #e74c3c;
            font-size: 0.8rem;
            margin-top: 5px;
            text-align: center;
        }

        .success-message {
            color: #27ae60;
            font-size: 0.8rem;
            margin-top: 5px;
            text-align: center;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 280px;
            }
            .message-bubble {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container" id="chatContainer" style="display: none;">
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>🌍 CityChat</h2>
                <div class="user-profile" id="userProfile">
                    <div class="user-profile-name" id="profileName">Загрузка...</div>
                    <div class="user-profile-city" id="profileCity">📍 Город</div>
                    <button class="logout-btn" id="logoutBtn">🚪 Выйти</button>
                </div>
                <input type="text" class="city-filter" id="cityFilter" placeholder="🔍 Фильтр по городу...">
            </div>
            <div class="online-stats" id="onlineStats">
                👥 Онлайн: <span id="onlineCount">0</span>
            </div>
            <div class="online-users" id="onlineUsers">
                <div style="text-align: center; padding: 20px;">Загрузка...</div>
            </div>
        </div>
        <div class="chat-main">
            <div class="chat-header">
                <div>
                    <div class="chat-title" id="chatTitle">💬 Общий чат</div>
                    <div class="private-chat-info" id="privateChatInfo" style="display: none;"></div>
                </div>
                <div class="city-badge" id="currentUserCity">Загрузка...</div>
            </div>
            <div class="messages-area" id="messagesArea">
                <div style="text-align: center; color: #7f8c8d; margin-top: 50px;">
                    ✨ Добро пожаловать! Напишите первое сообщение ✨
                </div>
            </div>
            <div class="typing-indicator" id="typingIndicator"></div>
            <div class="input-panel">
                <div class="input-wrapper">
                    <input type="text" id="messageInput" placeholder="Введите сообщение..." autocomplete="off">
                    <button class="send-btn" id="sendBtn">📤 Отправить</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Модальное окно входа/регистрации -->
    <div class="modal" id="authModal">
        <div class="modal-content">
            <h2>🌆 Добро пожаловать в CityChat!</h2>
            <div class="modal-tabs">
                <button class="tab-btn active" data-tab="login">Вход</button>
                <button class="tab-btn" data-tab="register">Регистрация</button>
            </div>
            
            <!-- Форма входа -->
            <div class="tab-content active" id="loginTab">
                <input type="text" id="loginUsername" placeholder="Имя пользователя">
                <input type="password" id="loginPassword" placeholder="Пароль">
                <button id="loginBtn">Войти</button>
                <div id="loginError" class="error-message"></div>
            </div>
            
            <!-- Форма регистрации -->
            <div class="tab-content" id="registerTab">
                <input type="text" id="regUsername" placeholder="Имя пользователя (мин. 3 символа)">
                <input type="text" id="regName" placeholder="Ваше имя">
                <input type="text" id="regCity" placeholder="Ваш город">
                <input type="password" id="regPassword" placeholder="Пароль (мин. 4 символа)">
                <input type="password" id="regConfirmPassword" placeholder="Подтвердите пароль">
                <button id="registerBtn">Зарегистрироваться</button>
                <div id="registerError" class="error-message"></div>
                <div id="registerSuccess" class="success-message"></div>
            </div>
        </div>
    </div>

    <script>
        let socket = null;
        let currentUser = null;
        let typingTimeout = null;
        let privateChatWith = null; // Имя пользователя для приватного чата
        
        // API запросы
        async function apiRequest(endpoint, data) {
            const response = await fetch(endpoint, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            return await response.json();
        }
        
        // Регистрация
        async function register() {
            const username = document.getElementById('regUsername').value.trim();
            const name = document.getElementById('regName').value.trim();
            const city = document.getElementById('regCity').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            
            const errorDiv = document.getElementById('registerError');
            const successDiv = document.getElementById('registerSuccess');
            errorDiv.textContent = '';
            successDiv.textContent = '';
            
            if (!username || !name || !city || !password) {
                errorDiv.textContent = 'Заполните все поля';
                return;
            }
            
            if (username.length < 3) {
                errorDiv.textContent = 'Имя пользователя должно содержать минимум 3 символа';
                return;
            }
            
            if (password.length < 4) {
                errorDiv.textContent = 'Пароль должен содержать минимум 4 символа';
                return;
            }
            
            if (password !== confirmPassword) {
                errorDiv.textContent = 'Пароли не совпадают';
                return;
            }
            
            const result = await apiRequest('/api/register', { username, password, name, city });
            
            if (result.error) {
                errorDiv.textContent = result.error;
            } else {
                successDiv.textContent = result.message;
                setTimeout(() => {
                    // Переключаемся на вкладку входа
                    document.querySelector('.tab-btn[data-tab="login"]').click();
                    document.getElementById('loginUsername').value = username;
                }, 1000);
            }
        }
        
        // Вход
        async function login() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError');
            errorDiv.textContent = '';
            
            if (!username || !password) {
                errorDiv.textContent = 'Введите имя пользователя и пароль';
                return;
            }
            
            const result = await apiRequest('/api/login', { username, password });
            
            if (result.error) {
                errorDiv.textContent = result.error;
            } else {
                currentUser = result.user;
                startChat();
            }
        }
        
        // Запуск чата
        function startChat() {
            document.getElementById('authModal').style.display = 'none';
            document.getElementById('chatContainer').style.display = 'flex';
            document.getElementById('profileName').textContent = currentUser.name;
            document.getElementById('profileCity').textContent = `📍 ${currentUser.city}`;
            document.getElementById('currentUserCity').textContent = `📍 ${currentUser.city}`;
            
            // Подключаемся к WebSocket
            socket = io();
            
            socket.on('connect', () => {
                socket.emit('user_login', {
                    username: currentUser.username,
                    name: currentUser.name,
                    city: currentUser.city
                });
            });
            
            // Обработка сообщений
            socket.on('chat_history', (history) => {
                const container = document.getElementById('messagesArea');
                container.innerHTML = '';
                history.forEach(renderMessage);
            });
            
            socket.on('new_message', (message) => {
                renderMessage(message);
            });
            
            socket.on('private_message', (message) => {
                renderMessage({
                    ...message,
                    type: 'private',
                    text: `🔒 Приватно от ${message.from}: ${message.text}`
                });
            });
            
            socket.on('users_list', (users) => {
                updateUsersList(users);
                document.getElementById('onlineCount').textContent = users.length;
            });
            
            socket.on('user_joined', (data) => {
                updateUsersList(data.users);
                document.getElementById('onlineCount').textContent = data.onlineCount;
                const systemMsg = {
                    type: 'system',
                    text: `${data.user.name} из города ${data.user.city} присоединился!`,
                    sender: '🌍 Система',
                    timestamp: new Date().toLocaleTimeString()
                };
                renderMessage(systemMsg);
            });
            
            socket.on('user_left', (data) => {
                updateUsersList(data.users);
                document.getElementById('onlineCount').textContent = data.onlineCount;
                const systemMsg = {
                    type: 'system',
                    text: `${data.user.name} из города ${data.user.city} покинул чат`,
                    sender: '🌍 Система',
                    timestamp: new Date().toLocaleTimeString()
                };
                renderMessage(systemMsg);
            });
            
            socket.on('user_typing', (data) => {
                const indicator = document.getElementById('typingIndicator');
                if (data.isTyping) {
                    indicator.textContent = `${data.user.name} (${data.user.city}) печатает...`;
                    setTimeout(() => {
                        if (indicator.textContent.includes(data.user.name)) {
                            indicator.textContent = '';
                        }
                    }, 2000);
                } else if (indicator.textContent.includes(data.user.name)) {
                    indicator.textContent = '';
                }
            });
        }
        
        // Отправка сообщения
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if (!text) return;
            
            if (privateChatWith) {
                // Приватное сообщение
                socket.emit('private_message', { to: privateChatWith, text });
                renderMessage({
                    type: 'private',
                    text: `🔒 Приватно для ${privateChatWith}: ${text}`,
                    sender: currentUser.name,
                    timestamp: new Date().toLocaleTimeString(),
                    isOwn: true
                });
            } else {
                // Публичное сообщение
                socket.emit('send_message', { text });
            }
            
            input.value = '';
            socket.emit('typing', false);
        }
        
        // Отрисовка сообщения
        function renderMessage(message) {
            const container = document.getElementById('messagesArea');
            const isOwn = message.isOwn || (currentUser && message.sender === currentUser.name);
            
            let messageClass = 'message';
            if (isOwn) messageClass += ' own';
            if (message.type === 'system') messageClass += ' system';
            if (message.type === 'private') messageClass += ' private';
            
            const messageDiv = document.createElement('div');
            messageDiv.className = messageClass;
            messageDiv.innerHTML = `
                <div class="message-bubble">
                    <div class="message-info">
                        <span class="message-sender">${escapeHtml(message.sender || 'Система')}</span>
                        ${message.city ? `<span class="message-city">📍 ${escapeHtml(message.city)}</span>` : ''}
                        <span class="message-time">${message.timestamp || new Date().toLocaleTimeString()}</span>
                    </div>
                    <div class="message-text">${escapeHtml(message.text)}</div>
                </div>
            `;
            
            container.appendChild(messageDiv);
            container.scrollTop = container.scrollHeight;
        }
        
        // Обновление списка пользователей
        function updateUsersList(users) {
            const container = document.getElementById('onlineUsers');
            const filter = document.getElementById('cityFilter')?.value.toLowerCase() || '';
            
            const filteredUsers = users.filter(u => 
                u.city.toLowerCase().includes(filter) || 
                u.name.toLowerCase().includes(filter)
            );
            
            container.innerHTML = filteredUsers.map(user => `
                <div class="user-item" data-username="${user.username}">
                    <div class="user-avatar">${user.name.charAt(0).toUpperCase()}</div>
                    <div class="user-info">
                        <div class="user-name">${escapeHtml(user.name)}</div>
                        <div class="user-city">📍 ${escapeHtml(user.city)}</div>
                    </div>
                </div>
            `).join('');
            
            // Добавляем обработчики для приватных сообщений
            document.querySelectorAll('.user-item').forEach(el => {
                el.addEventListener('click', () => {
                    const username = el.dataset.username;
                    if (username === currentUser.username) {
                        alert('Нельзя отправить сообщение самому себе');
                        return;
                    }
                    startPrivateChat(username, el.querySelector('.user-name').textContent);
                });
            });
        }
        
        // Начать приватный чат
        function startPrivateChat(username, name) {
            privateChatWith = username;
            document.getElementById('chatTitle').innerHTML = `💬 Приватный чат с ${name}`;
            document.getElementById('privateChatInfo').style.display = 'block';
            document.getElementById('privateChatInfo').innerHTML = `🔒 Общаетесь приватно с ${name}. <a href="#" onclick="exitPrivateChat(); return false;">Выйти из приватного чата</a>`;
            document.getElementById('messageInput').placeholder = `Приватное сообщение для ${name}...`;
        }
        
        // Выйти из приватного чата
        function exitPrivateChat() {
            privateChatWith = null;
            document.getElementById('chatTitle').innerHTML = '💬 Общий чат';
            document.getElementById('privateChatInfo').style.display = 'none';
            document.getElementById('messageInput').placeholder = 'Введите сообщение...';
        }
        
        // Выход из аккаунта
        function logout() {
            if (socket) {
                socket.disconnect();
            }
            currentUser = null;
            privateChatWith = null;
            document.getElementById('authModal').style.display = 'flex';
            document.getElementById('chatContainer').style.display = 'none';
            document.getElementById('loginUsername').value = '';
            document.getElementById('loginPassword').value = '';
        }
        
        function handleTyping() {
            if (!socket) return;
            socket.emit('typing', true);
            if (typingTimeout) clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                socket.emit('typing', false);
            }, 1000);
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Переключение вкладок
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const tab = btn.dataset.tab;
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(`${tab}Tab`).classList.add('active');
            });
        });
        
        // Обработчики
        document.getElementById('loginBtn').addEventListener('click', login);
        document.getElementById('registerBtn').addEventListener('click', register);
        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        document.getElementById('logoutBtn').addEventListener('click', logout);
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
            else handleTyping();
        });
        document.getElementById('cityFilter').addEventListener('input', () => {
            if (window.currentUsersList) updateUsersList(window.currentUsersList);
        });
        
        // Проверка Enter в формах
        document.getElementById('loginPassword').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });
        document.getElementById('regConfirmPassword').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') register();
        });
    </script>
</body>
</html>
